# Inspire AI — Databricks App. Workspace zip + installer: see deployment.md in the repo.
# Git-backed: Compute → Apps → Create from Git. Runtime injects DATABRICKS_HOST, DATABRICKS_TOKEN (if SP), PORT.

command:
  - "bash"
  - "start.sh"

env:
  - name: "NODE_ENV"
    value: "production"
  # Run as the signed-in user (on-behalf-of-user) so the app uses the USER's Unity Catalog
  # permissions instead of the app service principal's. Use when the SP cannot be granted rights.
  # Requires: enable User Authorization on the app + add the `sql` scope (App → Edit → User
  # authorization → +Add scope), and the signed-in user must have rights on the target schema.
  - name: "INSPIRE_PREFER_USER_TOKEN"
    value: "true"

# Service principal — the Databricks App runtime generates an OAuth token
# and injects it as DATABRICKS_TOKEN env var automatically.
resources:
  - name: "inspire-ai-sp"
    type: "service-principal"
